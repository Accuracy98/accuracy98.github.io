name: Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch landscape theme
        run: |
          rm -rf themes/landscape
          git clone --depth 1 https://github.com/hexojs/hexo-theme-landscape themes/landscape

      # - name: Update submodules (optional)
      #   run: git submodule update --init --recursive

      - name: Ensure landscape theme exists
        run: |
          # 1) 先尝试拉 submodule（最规范）
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1 || true

          # 2) 如果 submodule 仍然没把 layout 拉下来，就直接 clone 兜底（保证不再白屏）
          if [ ! -f themes/landscape/layout/index.ejs ]; then
            echo "Submodule theme missing layout. Cloning landscape theme..."
            rm -rf themes/landscape
            git clone --depth 1 https://github.com/hexojs/hexo-theme-landscape themes/landscape
          fi

          # 3) 最终必须存在 layout，否则直接失败（避免再部署空页面）
          test -f themes/landscape/layout/index.ejs
          ls -la themes/landscape/layout | head

      - name: Build (Hexo clean & generate)
        run: |
          npx hexo clean
          npx hexo generate

      - name: Debug public output
        run: |
          ls -la public | head -n 50
          echo "index.html bytes:"
          wc -c public/index.html || true
          echo "index.html preview:"
          head -n 20 public/index.html || true      

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: blog.accuracy98.com
